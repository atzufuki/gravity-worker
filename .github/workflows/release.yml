name: Tag-Gated Release Workflow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Release Pre-flight Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Deno Environment
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Test Suite
        run: deno task test

  release:
    name: Build & Publish Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Deno Environment
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build Release Binary
        run: deno task compile

      - name: Package Release Assets
        id: package
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="herkules-${TAG_NAME}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p dist
          cp herkules dist/ 2>/dev/null || true
          tar -czvf "${ARCHIVE_NAME}" -C dist .
          echo "archive_name=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT

      - name: Create Tagged Release with Generated Notes
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
