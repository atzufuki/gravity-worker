name: 'GravityWorker Agent'
description: 'Universal AI Agent Runner & Orchestrator for Git Worktrees & CI'
branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  prompt:
    description: 'Instructions / Prompt for the AI agent'
    required: false
  agent:
    description: 'AI agent engine to use (default: antigravity)'
    required: false
    default: 'antigravity'
  issue-id:
    description: 'GitHub Issue ID being processed'
    required: false
  github-token:
    description: 'GitHub Token for posting comments and PRs'
    required: false
  gemini-api-key:
    description: 'API key for Antigravity engine / Gemini API'
    required: false
  app-id:
    description: 'GitHub App ID for dedicated gravity-worker[bot] identity'
    required: false
  private-key:
    description: 'GitHub App Private Key for dedicated gravity-worker[bot] identity'
    required: false

outputs:
  status:
    description: 'Execution status (success or failure)'
  branch:
    description: 'Created Git worktree branch name'

runs:
  using: 'composite'
  steps:
    - name: Setup Deno Environment
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x

    - name: Setup Antigravity CLI (agy)
      shell: bash
      run: |
        if ! command -v agy &> /dev/null; then
          echo "🚀 Installing official Antigravity CLI (agy)..."
          curl -fsSL https://antigravity.google/cli/install.sh | bash || true
          if [ -d "$HOME/.local/bin" ]; then
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi
          if [ -d "$HOME/.antigravity/bin" ]; then
            echo "$HOME/.antigravity/bin" >> $GITHUB_PATH
          fi
        fi

    - name: Run GravityWorker CLI
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GRAVITY_WORKER_APP_ID: ${{ inputs.app-id }}
        GRAVITY_WORKER_PRIVATE_KEY: ${{ inputs.private-key }}
      run: |
        deno run -A ${{ github.action_path }}/project/cli.ts run \
          --prompt "${{ inputs.prompt }}" \
          --agent "${{ inputs.agent }}" \
          --issue "${{ inputs.issue-id }}"
